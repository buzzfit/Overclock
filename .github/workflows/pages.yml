name: Web (pygbag) — Build & Deploy to Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # pygbag targets CPython on WebAssembly

      # Configure Pages (per GH docs)
      - uses: actions/configure-pages@v5

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install "pygbag>=0.9" "pygame>=2.5"

      - name: Build web with pygbag
        run: |
          python -m pygbag game
          test -f build/web/index.html

      # Upload static site artifact for Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
